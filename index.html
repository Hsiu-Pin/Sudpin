<!DOCTYPE html>
<html lang="zh-TW" class="theme-transition dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南崧文創 | Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind 配置自訂樣式 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .theme-transition {
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s ease, color 0.4s ease;
        }
        /* 隱藏滾動條，保持單頁乾淨視覺 */
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }
        /* 讓外框的高度變化支援流暢的動畫 */
        .img-wrapper {
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: height;
        }
        /* 圖片過渡與變形設定 */
        .portfolio-card img {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        /* 滑鼠懸停時微幅放大 (未展開狀態) */
        .portfolio-card:hover:not(.expanded) img {
            transform: scale(1.02);
        }
        /* 點擊展開時，外框拉伸，內部圖片跟著順滑縮放放大 30% (+30%) */
        .portfolio-card.expanded img {
            transform: scale(1.30);
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 dark:bg-stone-950 dark:text-stone-100 theme-transition font-sans antialiased min-h-screen md:h-screen md:overflow-hidden flex flex-col justify-between p-4 sm:p-8">

    <!-- ==========================================
         CONFIG 配置模組
         ========================================== -->
    <script>
        const PORTFOLIO_CONFIG = {
            brandName: "南崧文創",
            contact: {
                email: "service@nansong.com.tw",
                phone: "+886 2-1234-5678"
            },
            about: {
                title: "關於南崧文創 / ABOUT US",
                subtitle: "「以設計為載體，傳遞文化的厚度與空間的張力。」",
                content: "南崧文創成立於台北，致力於提供高端品牌規劃、空間美學設計與視覺藝術整合服務。\n\n我們編織當代語彙與傳統匠藝，在結構、光影與材質之間尋求完美平衡。每一項作品都是一場對極簡美學的探索，力求為觀者帶來最深邃的視覺故事與無可取代的品牌價值。"
            },
            concept: {
                tagline: "DESIGN CONCEPT / 設計理念",
                title: "「在繁複的世界中，探尋物件最純粹的本質與張力。」",
                description: "我們深信，好的設計不需冗贅的裝飾。透過結構的重組、光影的留白與細緻的材質紋理，我們將概念具象化，在極簡的框限之中，釋放出最深遠的視覺故事與實用價值。"
            },
            projects: [
                {
                    title: "幾何虛實・光影雕琢",
                    image: "image/南崧01.jpg",
                    fallbackText: "南崧 01"
                },
                {
                    title: "現代主義・結構留白",
                    image: "image/南崧02.jpg",
                    fallbackText: "南崧 02"
                },
                {
                    title: "侘寂美學・自然共生",
                    image: "image/南崧03.jpg",
                    fallbackText: "南崧 03"
                }
            ]
        };
    </script>

    <!-- 頂部導覽 Minimal Header -->
    <header class="w-full max-w-6xl mx-auto flex justify-between items-center py-4 relative z-40">
        <a href="#" id="header-brand-name" class="text-lg font-medium tracking-[0.2em] text-stone-900 dark:text-stone-100 transition-colors duration-300">
        </a>
        
        <div class="flex items-center space-x-3 sm:space-x-6 relative">
            <button id="about-toggle" class="text-sm font-medium tracking-wider text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100 transition duration-300 py-2 px-3 rounded-none hover:bg-stone-200/30 dark:hover:bg-stone-800/30">
                <span>關於南崧</span>
            </button>

            <div class="relative">
                <button id="contact-toggle" class="text-sm font-medium tracking-wider text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100 transition duration-300 flex items-center gap-1.5 focus:outline-none py-2 px-3 rounded-lg hover:bg-stone-200/30 dark:hover:bg-stone-800/30">
                    <span>聯繫方式</span>
                    <i id="contact-arrow" class="fas fa-chevron-down text-xs transition-transform duration-300"></i>
                </button>
                
                <div id="contact-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-white/95 dark:bg-stone-900/95 backdrop-blur-md border border-stone-200/80 dark:border-stone-800/85 rounded-xl p-4 shadow-xl z-50 transition-all duration-300 opacity-0 transform scale-95 origin-top-right">
                    <div class="space-y-3">
                        <div class="flex items-start gap-3">
                            <div class="text-stone-400 dark:text-stone-500 mt-0.5">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-stone-400 dark:text-stone-500 font-bold tracking-widest uppercase">Email</p>
                                <a id="contact-email" href="" class="text-xs font-medium hover:text-primary-500 dark:hover:text-primary-400 transition-colors break-all"></a>
                            </div>
                        </div>
                        <div class="border-t border-stone-200/40 dark:border-stone-800/50 my-1"></div>
                        <div class="flex items-start gap-3">
                            <div class="text-stone-400 dark:text-stone-500 mt-0.5">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <div>
                                <p class="text-[10px] text-stone-400 dark:text-stone-500 font-bold tracking-widest uppercase">Phone</p>
                                <a id="contact-phone" href="" class="text-xs font-medium hover:text-primary-500 dark:hover:text-primary-400 transition-colors"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主體內容區 -->
    <main class="w-full max-w-6xl mx-auto flex-grow flex flex-col justify-center gap-12 sm:gap-16 py-30 md:py-30 relative">
        
        <section class="max-w-3xl mx-auto text-center space-y-4">
            <span id="concept-tagline" class="text-xs font-semibold tracking-widest text-primary-500 uppercase block"></span>
            <h1 id="concept-title" class="text-xl sm:text-3xl font-light tracking-tight leading-relaxed"></h1>
            <p id="concept-description" class="text-xs sm:text-sm text-stone-500 dark:text-stone-400 max-w-2xl mx-auto leading-relaxed font-light"></p>
        </section>

        <section id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-3 gap-3 lg:gap-4 items-start md:h-[340px] md:max-h-[340px] relative overflow-visible">
        </section>
    </main>

    <!-- 頁尾 Minimal Footer -->
    <footer class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center py-8 border-t border-stone-200/40 dark:border-stone-800/40 gap-2 relative z-10">
        <p class="text-[11px] text-stone-400 tracking-wider">
            &copy; <span id="current-year"></span> <span id="footer-brand-name" class="tracking-widest font-medium"></span>
        </p>
    </footer>

    <!-- 關於南崧 彈出介紹視窗 (Modal) -->
    <div id="about-modal" class="fixed inset-0 z-50 hidden bg-stone-950/85 backdrop-blur-md flex items-center justify-center p-4 transition-opacity duration-300 opacity-0 cursor-pointer">
        <div id="about-modal-content" class="bg-white dark:bg-stone-900/95 border border-stone-200/80 dark:border-stone-800 rounded-none max-w-lg w-full p-8 shadow-2xl relative transform scale-95 transition-transform duration-300 cursor-default">
            <button id="about-modal-close" class="absolute top-4 right-4 text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 text-xl transition-colors">
                <i class="fas fa-times"></i>
            </button>
            <div class="space-y-4 text-left">
                <span class="text-xs font-bold tracking-widest text-stone-400 dark:text-stone-500 uppercase">ABOUT COMPANY</span>
                <h2 id="about-modal-title" class="text-xl sm:text-2xl font-bold tracking-wide text-stone-800 dark:text-stone-100"></h2>
                <div class="border-t border-stone-200/50 dark:border-stone-800/80 my-2"></div>
                <p id="about-modal-subtitle" class="text-xs text-primary-500 font-bold leading-relaxed"></p>
                <p id="about-modal-desc" class="text-xs sm:text-sm text-stone-600 dark:text-stone-300 leading-relaxed font-light whitespace-pre-line"></p>
            </div>
        </div>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderContent();
            initContactDropdown();
            initExpandFeature();
            initAboutModal();
        });

        function renderContent() {
            document.title = `${PORTFOLIO_CONFIG.brandName} | Portfolio`;
            document.getElementById('header-brand-name').textContent = PORTFOLIO_CONFIG.brandName;
            document.getElementById('footer-brand-name').textContent = PORTFOLIO_CONFIG.brandName;
            document.getElementById('current-year').textContent = new Date().getFullYear();

            const emailLink = document.getElementById('contact-email');
            emailLink.href = `mailto:${PORTFOLIO_CONFIG.contact.email}`;
            emailLink.textContent = PORTFOLIO_CONFIG.contact.email;

            const phoneLink = document.getElementById('contact-phone');
            phoneLink.href = `tel:${PORTFOLIO_CONFIG.contact.phone.replace(/[^0-9+]/g, '')}`;
            phoneLink.textContent = PORTFOLIO_CONFIG.contact.phone;

            document.getElementById('concept-tagline').textContent = PORTFOLIO_CONFIG.concept.tagline;
            document.getElementById('concept-title').textContent = PORTFOLIO_CONFIG.concept.title;
            document.getElementById('concept-description').textContent = PORTFOLIO_CONFIG.concept.description;

            document.getElementById('about-modal-title').textContent = PORTFOLIO_CONFIG.about.title;
            document.getElementById('about-modal-subtitle').textContent = PORTFOLIO_CONFIG.about.subtitle;
            document.getElementById('about-modal-desc').textContent = PORTFOLIO_CONFIG.about.content;

            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = ''; 

            PORTFOLIO_CONFIG.projects.forEach((proj, idx) => {
                const cardHTML = `
                    <div class="portfolio-card group bg-white dark:bg-stone-900 rounded-none overflow-hidden border border-stone-200/60 dark:border-stone-800/60 shadow-sm transition-all duration-500 cursor-pointer relative z-10">
                        <div class="img-wrapper relative overflow-hidden bg-stone-100 dark:bg-stone-800 h-[300px] sm:h-[340px]">
                            <img src="${proj.image}" 
                                 alt="${proj.title}" 
                                 class="w-full h-full object-cover"
                                 onerror="this.src='https://placehold.co/800x600/292524/ffffff?text=${encodeURIComponent(proj.fallbackText)}'">
                        </div>
                        <div class="p-2.5 text-center text-xs border-t border-stone-100 dark:border-stone-850">
                            <h3 class="font-medium text-stone-700 dark:text-stone-300 truncate" title="${proj.title}">${proj.title}</h3>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function initContactDropdown() {
            const contactToggle = document.getElementById('contact-toggle');
            const contactDropdown = document.getElementById('contact-dropdown');
            const contactArrow = document.getElementById('contact-arrow');

            function toggleDropdown(show) {
                if (show) {
                    contactDropdown.classList.remove('hidden');
                    setTimeout(() => {
                        contactDropdown.classList.remove('opacity-0', 'scale-95');
                        contactDropdown.classList.add('opacity-100', 'scale-100');
                        contactArrow.classList.add('rotate-180');
                    }, 10);
                } else {
                    contactDropdown.classList.remove('opacity-100', 'scale-100');
                    contactDropdown.classList.add('opacity-0', 'scale-95');
                    contactArrow.classList.remove('rotate-180');
                    setTimeout(() => {
                        contactDropdown.classList.add('hidden');
                    }, 300);
                }
            }

            contactToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = contactDropdown.classList.contains('hidden');
                toggleDropdown(isHidden);
            });

            document.addEventListener('click', (e) => {
                if (!contactDropdown.classList.contains('hidden') && !contactDropdown.contains(e.target) && e.target !== contactToggle) {
                    toggleDropdown(false);
                }
            });
        }

        function initExpandFeature() {
            const grid = document.getElementById('portfolio-grid');
            
            grid.addEventListener('click', (e) => {
                const card = e.target.closest('.portfolio-card');
                if (!card) return;

                const wrapper = card.querySelector('.img-wrapper');
                const img = card.querySelector('img');
                const isExpanded = card.classList.contains('expanded');

                document.querySelectorAll('.portfolio-card').forEach(otherCard => {
                    if (otherCard !== card && otherCard.classList.contains('expanded')) {
                        collapseCard(otherCard);
                    }
                });

                if (isExpanded) {
                    collapseCard(card);
                } else {
                    card.classList.add('expanded');
                    card.classList.remove('z-10');
                    card.classList.add('z-30', 'shadow-2xl', 'scale-[1.01]');
                    
                    const startHeight = wrapper.offsetHeight;
                    wrapper.style.height = `${startHeight}px`;
                    wrapper.dataset.originalHeight = startHeight;
                    wrapper.offsetHeight; 

                    const rect = wrapper.getBoundingClientRect();
                    const imgNaturalWidth = img.naturalWidth || 800;
                    const imgNaturalHeight = img.naturalHeight || 600;
                    const aspectRatio = imgNaturalWidth / imgNaturalHeight;
                    
                    let targetHeight = rect.width / aspectRatio;
                    const maxViewportHeight = window.innerHeight * 0.55; 
                    if (targetHeight > maxViewportHeight) {
                        targetHeight = maxViewportHeight;
                    }

                    wrapper.style.height = `${targetHeight}px`;
                }
            });
        }

        function collapseCard(card) {
            card.classList.remove('expanded');
            card.classList.remove('scale-[1.01]');
            
            const wrapper = card.querySelector('.img-wrapper');
            const originalHeight = wrapper.dataset.originalHeight || (window.innerWidth < 640 ? 300 : 340);
            
            wrapper.style.height = `${originalHeight}px`;

            setTimeout(() => {
                if (!card.classList.contains('expanded')) {
                    wrapper.style.height = '';
                    card.classList.remove('z-30', 'shadow-2xl');
                    card.classList.add('z-10');
                }
            }, 800);
        }

        function initAboutModal() {
            const aboutToggle = document.getElementById('about-toggle');
            const aboutModal = document.getElementById('about-modal');
            const aboutModalContent = document.getElementById('about-modal-content');
            const aboutModalClose = document.getElementById('about-modal-close');

            function toggleModal(show) {
                if (show) {
                    aboutModal.classList.remove('hidden');
                    aboutModal.offsetHeight;
                    aboutModal.classList.remove('opacity-0');
                    aboutModal.classList.add('opacity-100');
                    aboutModalContent.classList.remove('scale-95');
                    aboutModalContent.classList.add('scale-100');
                    document.body.classList.add('overflow-hidden');
                } else {
                    aboutModal.classList.remove('opacity-100');
                    aboutModal.classList.add('opacity-0');
                    aboutModalContent.classList.remove('scale-100');
                    aboutModalContent.classList.add('scale-95');
                    document.body.classList.remove('overflow-hidden');
                    setTimeout(() => {
                        aboutModal.classList.add('hidden');
                    }, 300);
                }
            }

            aboutToggle.addEventListener('click', () => toggleModal(true));
            aboutModalClose.addEventListener('click', () => toggleModal(false));
            aboutModal.addEventListener('click', (e) => {
                if (e.target === aboutModal) {
                    toggleModal(false);
                }
            });
        }
    </script>
</body>
</html>
